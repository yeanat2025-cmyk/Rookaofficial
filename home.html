<!DOCTYPE html>
<html>
<head>
  <title>Rooka Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background: linear-gradient(to right, #f7d774, #f2c94c);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      background:#fff;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }
    .logo{
      width:90px;
      margin-bottom:10px;
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }
    button{
      width:100%;
      padding:12px;
      background:#f2c94c;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }
    #errorMsg{
      color:red;
      margin-top:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="assets/logo.png" class="logo">
  <h2>Rooka Login</h2>

  <form id="loginForm">
    <input type="text" id="idOrEmail" placeholder="Enter Rooka ID or Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login / Register</button>
  </form>

  <p id="errorMsg"></p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Slider load
const sliderDoc = await getDoc(doc(db,"media","slider"));
const slides = sliderDoc.data().images;

let i=0;
setInterval(()=>{
  document.getElementById("slide").src = "assets/"+slides[i];
  i=(i+1)%slides.length;
},2000);

// Main Image
const mainDoc = await getDoc(doc(db,"media","mainImg"));
document.getElementById("mainImg").src = "assets/"+mainDoc.data().url;

// Grid Images
const gridDoc = await getDoc(doc(db,"media","gridImgs"));
const grid = gridDoc.data().urls;
document.getElementById("g1").src = "assets/"+grid[0];
document.getElementById("g2").src = "assets/"+grid[1];

</script>
</body>
</html>
