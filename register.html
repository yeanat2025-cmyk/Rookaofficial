<!DOCTYPE html>
<html>
<head>
  <title>Rooka Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f7d774;
    }

    .box{
      background:#fff;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:12px;
      background:#f2c94c;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    .login{
      margin-top:15px;
      font-size:14px;
    }

    .login a{
      color:#000;
      font-weight:bold;
      text-decoration:none;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Rooka Register</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="rookaId" placeholder="Rooka ID" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Register</button>
  </form>

  <!-- Login Link -->
  <div class="login">
    Already have account? <a href="index.html">Login</a>
  </div>

</div>

<script type="module">
import { collection, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_qWfwC0YcWHxjs16d6LnAxzKBZg0a0P0",
  authDomain: "titi-live1.firebaseapp.com",
  projectId: "titi-live1",
  storageBucket: "titi-live1.appspot.com",
  messagingSenderId: "184688632840",
  appId: "1:184688632840:web:85caa04f3884ca5c609dbd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById('registerForm');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();

  const name = document.getElementById('name').value;
  const rookaId = document.getElementById('rookaId').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  await setDoc(doc(collection(db,"users"), rookaId), {
    name: name,
    email: email,
    password: password,
    status: "active",
    deviceStatus: "enabled",
    timestamp: new Date()
  });

  alert("Register Success!");
  window.location.href = "index.html";
});
</script>

</body>
</html>
